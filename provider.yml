name: valkey

# Backend configuration - points to the application repository
backend:
  landscape:
    ciProfile: "prod"

# Marketplace display information
displayName: "Valkey"
description: "open source redis alternative"
author: "Codesphere"
category: ""
version: "v0"
iconUrl: "https://avatars.githubusercontent.com/u/164458127?s=200&v=4"

configSchema:
  type: object
  properties: {}

detailsSchema:
  type: object
  properties: {}

secretsSchema:
  type: object
  properties:
    valkeyPwd:
      type: string
      format: password
  required:
    - valkeyPwd
  additionalProperties: false


# Service plans with pricing tiers
plans:
  - id: 0
    name: "Default"
    description: "Default Plan"
    parameters: {}